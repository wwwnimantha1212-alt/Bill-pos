<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Electrical Estimator Pro</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.28/jspdf.plugin.autotable.min.js"></script>
    
    <style>
        * { box-sizing: border-box; }
        html, body { height: 100%; margin: 0; overflow: hidden; font-family: 'Segoe UI', sans-serif; background-color: #f0f2f5; }
        
        /* Setup Screen Style */
        #setupOverlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: #3498db; color: white; z-index: 1000;
            display: none; flex-direction: column; align-items: center; justify-content: center; padding: 20px;
        }
        .setup-card { background: white; color: #333; padding: 30px; border-radius: 15px; width: 100%; max-width: 400px; box-shadow: 0 10px 25px rgba(0,0,0,0.2); }
        .setup-card h2 { margin-top: 0; color: #2c3e50; text-align: center; }
        .setup-card input { width: 100%; padding: 12px; margin: 10px 0; border: 1px solid #ddd; border-radius: 8px; font-size: 1em; }
        .btn-save-profile { width: 100%; padding: 12px; background: #27ae60; color: white; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; margin-top: 10px; }

        /* Main App Style */
        .container { display: flex; flex-direction: column; height: 100vh; max-width: 900px; margin: auto; background: white; }
        .fixed-top { padding: 15px; border-bottom: 2px solid #34495e; background: #fff; flex-shrink: 0; }
        header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
        
        .user-badge { background: #f8fafc; padding: 8px 12px; border-radius: 8px; border: 1px solid #e2e8f0; display: flex; align-items: center; gap: 10px; cursor: pointer; }
        .user-badge:hover { background: #edf2f7; }

        .input-section { background: #f8fafc; padding: 12px; border-radius: 8px; border: 1px solid #e2e8f0; position: relative; margin-top: 10px; }
        .input-grid { display: grid; grid-template-columns: 2fr 1fr 1fr 1fr auto; gap: 5px; align-items: end; }
        .input-grid input, .input-grid select { padding: 10px; border: 1px solid #cbd5e1; border-radius: 6px; width: 100%; font-size: 0.85em; }
        .btn-add { padding: 0 15px; background: #3498db; color: white; border: none; border-radius: 6px; font-weight: bold; height: 40px; cursor: pointer; }

        #suggestionBox {
            position: absolute; background: white; border: 1px solid #ddd; border-radius: 4px;
            width: 40%; max-height: 150px; overflow-y: auto; z-index: 100; display: none;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1); top: 55px; left: 12px;
        }
        .suggestion-item { padding: 10px; cursor: pointer; border-bottom: 1px solid #eee; font-size: 0.9em; }
        .suggestion-item:hover { background-color: #f0f2f5; }

        .scrollable-list { flex-grow: 1; overflow-y: auto; padding: 0 15px; -webkit-overflow-scrolling: touch; }
        table { width: 100%; border-collapse: collapse; }
        th { position: sticky; top: 0; background: #34495e; color: white; padding: 10px; text-align: left; font-size: 0.8em; z-index: 10; }
        td { padding: 10px; border-bottom: 1px solid #e2e8f0; font-size: 0.85em; }
        .btn-remove { background: #ff4757; color: white; border: none; padding: 4px 8px; border-radius: 4px; cursor: pointer; }

        .fixed-bottom { padding: 15px; border-top: 2px solid #34495e; background: #fff; flex-shrink: 0; display: flex; justify-content: space-between; align-items: center; }
        .total-amount { font-size: 1.4em; font-weight: bold; color: #2c3e50; }
        .btn-download { padding: 10px 20px; background: #27ae60; color: white; border: none; border-radius: 20px; font-weight: bold; cursor: pointer; }
        
        @media (max-width: 600px) { 
            .input-grid { grid-template-columns: 1fr 1fr; } 
            .input-grid div:first-child { grid-column: span 2; } 
            .btn-add { grid-column: span 2; } 
            #suggestionBox { width: 90%; }
        }
    </style>
</head>
<body>

<div id="setupOverlay">
    <div class="setup-card">
        <h2>Business Profile</h2>
        <p style="font-size: 0.85em; color: #666; text-align: center;">Set up your details once to use on all estimates.</p>
        <label style="font-size: 0.8em; font-weight: bold;">YOUR NAME</label>
        <input type="text" id="setupName" placeholder="e.g. Nimantha Dilshan">
        <label style="font-size: 0.8em; font-weight: bold;">CONTACT NO</label>
        <input type="text" id="setupContact" placeholder="e.g. +94 77 XXX XXXX">
        <button class="btn-save-profile" onclick="saveProfile()">Continue</button>
    </div>
</div>

<div class="container">
    <div class="fixed-top">
        <header>
            <div class="user-badge" onclick="editProfile()">
                <div style="background: #3498db; color: white; width: 30px; height: 30px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: bold;" id="userInitial">N</div>
                <div style="line-height: 1.1;">
                    <div id="badgeName" style="font-size: 0.9em; font-weight: bold; color: #2c3e50;">User Name</div>
                    <div id="badgeContact" style="font-size: 0.7em; color: #7f8c8d;">Contact Info</div>
                </div>
                <div style="font-size: 0.8em; color: #bdc3c7; margin-left: 5px;">⚙️</div>
            </header>

        <div style="display: flex; gap: 10px; align-items: center;">
            <input type="text" id="customerName" placeholder="Customer Name" style="flex: 1; padding: 8px; border: 1px solid #ddd; border-radius: 6px; font-size: 0.9em;">
            <span id="displayDate" style="font-size: 0.8em; color: #7f8c8d; white-space: nowrap;"></span>
        </div>

        <div class="input-section">
            <div class="input-grid">
                <div style="position: relative; width: 100%;">
                    <input type="text" id="itemName" placeholder="Item or Labor Name" autocomplete="off" oninput="showSuggestions(this.value)">
                    <div id="suggestionBox"></div>
                </div>
                <select id="unit">
                    <option value="pcs">pcs</option><option value="m">mtr</option>
                    <option value="ft">ft</option><option value="Labor">Labor</option><option value="Other">Other</option>
                </select>
                <input type="number" id="qty" placeholder="Qty">
                <input type="number" id="price" placeholder="Price">
                <button class="btn-add" onclick="addItem()">Add</button>
            </div>
        </div>
    </div>

    <div class="scrollable-list">
        <table>
            <thead>
                <tr><th>Description</th><th style="width: 60px;">Qty</th><th style="width: 80px;">Rate</th><th style="width: 80px;">Total</th><th style="width: 30px;"></th></tr>
            </thead>
            <tbody id="tableBody"></tbody>
        </table>
    </div>

    <div class="fixed-bottom">
        <div><span style="font-size: 0.7em; color: #7f8c8d;">Grand Total:</span><br>
        <span class="total-amount">LKR <span id="grandTotal">0.00</span></span></div>
        <button class="btn-download" onclick="generatePDF()">Download PDF</button>
    </div>
</div>

<script>
    document.getElementById('displayDate').innerText = new Date().toLocaleDateString('en-GB');
    let items = [];
    let savedNames = JSON.parse(localStorage.getItem('savedItemNames')) || ["Wiring", "DB Fixing", "PVC Conduit"];

    // 1. Profile Logic
    window.onload = function() {
        const savedName = localStorage.getItem('issuerName');
        if (!savedName) {
            document.getElementById('setupOverlay').style.display = 'flex';
        } else {
            updateBadge();
        }
    };

    function saveProfile() {
        const name = document.getElementById('setupName').value.trim();
        const contact = document.getElementById('setupContact').value.trim();
        if(!name || !contact) { alert("Please fill details"); return; }
        
        localStorage.setItem('issuerName', name);
        localStorage.setItem('issuerContact', contact);
        document.getElementById('setupOverlay').style.display = 'none';
        updateBadge();
    }

    function updateBadge() {
        const name = localStorage.getItem('issuerName');
        const contact = localStorage.getItem('issuerContact');
        document.getElementById('badgeName').innerText = name;
        document.getElementById('badgeContact').innerText = contact;
        document.getElementById('userInitial').innerText = name.charAt(0).toUpperCase();
    }

    function editProfile() {
        document.getElementById('setupName').value = localStorage.getItem('issuerName');
        document.getElementById('setupContact').value = localStorage.getItem('issuerContact');
        document.getElementById('setupOverlay').style.display = 'flex';
    }

    // 2. Item Logic
    function showSuggestions(val) {
        const box = document.getElementById('suggestionBox');
        if (!val) { box.style.display = 'none'; return; }
        const filtered = savedNames.filter(name => name.toLowerCase().includes(val.toLowerCase()));
        if (filtered.length > 0) {
            box.innerHTML = filtered.map(name => `<div class="suggestion-item" onclick="selectSuggestion('${name}')">${name}</div>`).join('');
            box.style.display = 'block';
        } else { box.style.display = 'none'; }
    }

    function selectSuggestion(name) {
        document.getElementById('itemName').value = name;
        document.getElementById('suggestionBox').style.display = 'none';
    }

    function addItem() {
        const name = document.getElementById('itemName').value.trim();
        const unit = document.getElementById('unit').value;
        const qty = parseFloat(document.getElementById('qty').value);
        const price = parseFloat(document.getElementById('price').value);

        if(!name || isNaN(qty) || isNaN(price)) return;
        
        const disp = (unit === "Labor") ? `[LABOR] ${name}` : `${name} (${unit})`;
        items.push({ name: disp, qty, price });

        if(!savedNames.includes(name)) {
            savedNames.push(name);
            localStorage.setItem('savedItemNames', JSON.stringify(savedNames));
        }
        renderTable();
        document.getElementById('itemName').value = '';
        document.getElementById('qty').value = '';
        document.getElementById('price').value = '';
        document.getElementById('itemName').focus();
    }

    function removeItem(index) { items.splice(index, 1); renderTable(); }

    function renderTable() {
        const tbody = document.getElementById('tableBody'); tbody.innerHTML = ''; let total = 0;
        items.forEach((item, index) => {
            const subtotal = item.qty * item.price; total += subtotal;
            tbody.innerHTML += `<tr><td>${item.name}</td><td>${item.qty}</td><td>${item.price.toFixed(0)}</td><td>${subtotal.toFixed(0)}</td><td><button class="btn-remove" onclick="removeItem(${index})">×</button></td></tr>`;
        });
        document.getElementById('grandTotal').innerText = total.toLocaleString(undefined, {minimumFractionDigits: 2});
    }

    async function generatePDF() {
        const { jsPDF } = window.jspdf; const doc = new jsPDF();
        const issuer = localStorage.getItem('issuerName');
        const contact = localStorage.getItem('issuerContact');
        const customer = document.getElementById('customerName').value || 'Valued Customer';
        const date = document.getElementById('displayDate').innerText;

        doc.setFontSize(16); doc.text("JOB ESTIMATE & INVOICE", 14, 20);
        doc.setFontSize(10); 
        doc.text(`Issued By: ${issuer}`, 14, 30);
        doc.text(`Contact: ${contact}`, 14, 35);
        doc.text(`Customer: ${customer}`, 14, 42);
        doc.text(`Date: ${date}`, 160, 30);

        const tableData = items.map(item => [item.name, item.qty, item.price.toFixed(2), (item.qty * item.price).toFixed(2)]);
        doc.autoTable({ startY: 50, head: [['Description', 'Qty', 'Rate', 'Subtotal']], body: tableData, foot: [['', '', 'Total (LKR)', `${document.getElementById('grandTotal').innerText}`]], headStyles: { fillColor: [52, 152, 219] } });
        doc.save(`Estimate_${customer}.pdf`);
    }
</script>
</body>
</html>
